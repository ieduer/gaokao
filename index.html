<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI高考</title>
  <link rel="icon" href="https://raw.githubusercontent.com/gptv/suen/main/images/Avatar-small.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Header: Title and Button centered, Moon top-right -->
  <header>
    <div class="header-center-content"> <!-- Container for H1 and Gaokao Button -->
      <h1>AI高考</h1>
      <button id="gaokao-btn">北京真題</button> <!-- Apply Ghibli style via CSS -->
    </div>
    <button id="toggle-dark-btn" title="切換夜晚模式">🌗</button> <!-- Positioned via CSS -->
  </header>

  <main>
    <!-- 二級目錄：題型菜單 (Initially hidden) -->
    <section id="gaokao-type-menu" style="display:none;"></section>
    <!-- 三級目錄：年份列表 -->
    <section id="gaokao-year-menu" style="display:none;"></section>
    <!-- 題目顯示區 -->
    <section id="gaokao-question" style="display:none;"></section>

    <!-- 合併後的對話與輸入區域 -->
    <section id="dialogue-input-area" style="display:none;">
        <div id="messages"></div>
        <textarea id="userAnswer" placeholder="請輸入你的答案或想聊的話題…" style="width:calc(100% - 2rem); padding:1rem; font-size:1.2rem; margin-top:1rem; border:1px solid #ccc; border-radius:5px; min-height: 4rem; overflow-y:hidden; resize: vertical; box-sizing: border-box;"></textarea>
    </section>

    <!-- 底部互動按鈕區 -->
    <section id="gaokao-actions" style="display:none; text-align:center; margin-top: 1rem; margin-bottom: 1.5rem;">
      <div>
        <button id="submit-answer-btn">提交答案</button>
        <button id="reference-answer-btn">參考答案</button>
        <button id="ai-answer-btn">AI答案</button>
      </div>
    </section>

    <!-- 進度顯示 (如果需要) -->
    <div id="progress"></div>
  </main>

  <footer style="text-align:center; margin-top:20px;">
    <p>© Suen | <a href="https://bdfz.net/posts/aigaokao" target="_blank">About</a></p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
