<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI高考</title>
  <link rel="icon" href="https://raw.githubusercontent.com/gptv/suen/main/images/Avatar-small.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    /* 將夜晚模式按鈕放置到右上角 */
    #toggle-dark-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.0rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>AI高考</h1>
    <!-- 夜晚模式按鈕，使用 🌗 -->
    <button id="toggle-dark-btn" title="切換夜晚模式">🌗</button>
    <!-- 點擊後顯示二級目錄（題型按鈕） -->
    <button id="gaokao-btn" style="font-size:1.3rem; padding:1rem 1.5rem;">高考真題</button>
  </header>

  <main>
    <!-- 二級目錄：題型菜單 -->
    <section id="gaokao-type-menu" style="text-align: center;"></section>
    <!-- 三級目錄：年份列表 -->
    <section id="gaokao-year-menu" style="display:none;text-align: center;"></section>
    <!-- 題目顯示區，標題改為「背景真題」 -->
    <section id="gaokao-question" style="display:none;"></section>
    <!-- 對話窗口（預設隱藏，不再顯示灰色框，僅在互動時展開） -->  
    <section id="dialogue-box" style="display:none;">
      <div id="messages"></div>
    </section>
    <!-- 底部互動按鈕區：包含答案輸入框與三個互動按鈕 -->
    <section id="gaokao-actions" style="display:none; text-align:center;">
      <textarea id="userAnswer" placeholder="請輸入你的答案 (真題數據尚在校對中，AI回覆尚存在幻覺⋯⋯)" style="width:80%; padding:1rem; font-size:1.2rem; margin-bottom:1rem; border:1px solid #0077cc; border-radius:5px; height:2rem; overflow:hidden;"></textarea>
      <div>
        <button id="submit-answer-btn" style="font-size:1.0rem; padding:1rem 1.5rem;">提交答案</button>
        <button id="reference-answer-btn" style="font-size:1.0rem; padding:1rem 1.5rem;">參考答案</button>
        <button id="ai-answer-btn" style="font-size:1.0rem; padding:1rem 1.5rem;">AI答案</button>
      </div>
    </section>
    <!-- 進度顯示 -->
    <div id="progress"></div>
  </main>

  <footer style="text-align:center; margin-top:20px;">
    <p>© Suen | <a href="https://bdfz.net/posts/gaokao" target="_blank">About</a></p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
